# ============================================================================
# PIPELINE TEMPLATE: Bicep Deployment
# ============================================================================
#
# WHAT THIS IS:
#   The actual deployment stage. This creates/updates Azure resources.
#
# DEPLOYMENT JOBS VS REGULAR JOBS:
#   We use a 'deployment' job instead of a regular 'job'. The difference:
#   - Regular job: just runs steps. No environment tracking.
#   - Deployment job: linked to an Azure DevOps "environment". Environments
#     can have approval gates, deployment history, and health tracking.
#
#   For the 'prod' environment, we configure an approval gate in Azure DevOps
#   Project Settings → Environments → prod → Approvals and Checks. This means
#   the pipeline PAUSES before prod deployment and waits for a human to review
#   the what-if output and click "Approve."
#
# STRATEGY: runOnce
#   Azure DevOps deployment strategies:
#   - runOnce: deploy to all targets at once (our choice — we have one subscription)
#   - rolling: deploy to targets in batches (for multi-server deployments)
#   - canary: deploy to a small subset first, then all (for app deployments)
#
# ============================================================================

parameters:
  - name: serviceConnection
    type: string
  - name: environment
    type: string
  - name: dependsOn
    type: string

stages:
  - stage: Deploy${{ parameters.environment }}
    displayName: 'Deploy (${{ parameters.environment }})'
    dependsOn: ${{ parameters.dependsOn }}
    jobs:
      - deployment: Deploy
        displayName: 'Deploy Infrastructure'
        # This environment reference triggers the approval gate (if configured)
        environment: ${{ parameters.environment }}
        strategy:
          runOnce:
            deploy:
              steps:
                # checkout: self is required in deployment jobs because they
                # run in a clean workspace — the code isn't automatically available
                - checkout: self

                - task: AzureCLI@2
                  displayName: 'Deploy Bicep'
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnection }}
                    scriptType: 'bash'
                    inlineScript: | # Deploy the Bicep template using Azure CLI. The what-if output is in the logs.
                      echo "=== Deploying to ${{ parameters.environment }} ==="
                      echo "Build: $(Build.BuildNumber)"
                      echo ""

                      az deployment sub create \
                        --location westeurope \
                        --template-file infra/main.bicep \
                        --parameters infra/main.${{ parameters.environment }}.bicepparam \
                        --parameters jumpboxAdminPassword='$(jumpboxAdminPassword)' \
                        --name "deploy-$(Build.BuildNumber)"

                      echo ""
                      echo "=== Deployment Complete ==="

                # Post-deployment: show what was deployed
                - task: AzureCLI@2
                  displayName: 'Verify Deployment'
                  inputs:
                    azureSubscription: ${{ parameters.serviceConnection }}
                    scriptType: 'bash'
                    inlineScript: |
                      echo "=== Deployment Outputs ==="
                      az deployment sub show \
                        --name "deploy-$(Build.BuildNumber)" \
                        --query properties.outputs \
                        --output table
